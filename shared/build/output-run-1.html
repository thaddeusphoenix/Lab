<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Messages</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#F2F2F7;display:flex;justify-content:center;align-items:center;min-height:100vh}
.phone{width:390px;height:844px;background:#fff;border-radius:54px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 120px rgba(0,0,0,.35),0 0 0 1px rgba(0,0,0,.08)}
.status{height:50px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;flex-shrink:0}
.status-time{font-size:15px;font-weight:600;letter-spacing:-.3px}
.status-icons{display:flex;align-items:center;gap:6px}
.status-icons svg{display:block}
.nav{height:88px;background:#fff;border-bottom:1px solid rgba(0,0,0,.12);display:flex;align-items:flex-end;padding:0 8px 10px;flex-shrink:0;position:relative}
.nav-back{display:flex;align-items:center;gap:2px;color:#007AFF;font-size:17px;padding:6px 4px;cursor:pointer;min-width:60px}
.nav-back svg{flex-shrink:0}
.nav-back span{font-size:17px}
.nav-center{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;display:flex;flex-direction:column;align-items:center;gap:1px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#5AC8FA,#007AFF);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;margin-bottom:2px}
.nav-name{font-size:12px;font-weight:600;color:#000;letter-spacing:-.1px}
.nav-actions{display:flex;gap:16px;margin-left:auto;align-items:center;padding-bottom:2px}
.nav-btn{color:#007AFF;display:flex;align-items:center;justify-content:center;padding:4px;cursor:pointer}
.thread{flex:1;overflow-y:scroll;overflow-x:hidden;padding:8px 0 12px;display:flex;flex-direction:column;scrollbar-width:none}
.thread::-webkit-scrollbar{display:none}
.ts{text-align:center;font-size:11px;color:#8E8E93;margin:12px 0 8px;font-weight:500;letter-spacing:.2px}
.msg-row{display:flex;margin:1px 12px;flex-direction:column}
.msg-row.out{align-items:flex-end}
.msg-row.in{align-items:flex-start}
.bubble{max-width:72%;padding:9px 14px;font-size:17px;line-height:1.3;position:relative;word-break:break-word}
.out .bubble{background:#007AFF;color:#fff;border-radius:18px 18px 4px 18px}
.in .bubble{background:#E5E5EA;color:#000;border-radius:18px 18px 18px 4px}
.out .bubble::after{content:'';position:absolute;bottom:0;right:-7px;width:10px;height:14px;background:#007AFF;clip-path:polygon(0 0,100% 100%,0 100%);border-radius:0 0 4px 0}
.in .bubble::before{content:'';position:absolute;bottom:0;left:-7px;width:10px;height:14px;background:#E5E5EA;clip-path:polygon(100% 0,100% 100%,0 100%);border-radius:0 0 0 4px}
.delivered{font-size:11px;color:#8E8E93;text-align:right;margin:2px 14px 4px;font-weight:400}
.gap{margin-top:3px}
.bar{background:#fff;border-top:1px solid rgba(0,0,0,.12);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;padding-bottom:calc(8px + env(safe-area-inset-bottom,20px))}
.bar-icons{display:flex;gap:4px;color:#007AFF}
.bar-icons svg{cursor:pointer}
.input-wrap{flex:1;background:#F2F2F7;border-radius:20px;border:1px solid #D1D1D6;display:flex;align-items:center;padding:6px 8px 6px 14px;min-height:36px}
#msg-input{flex:1;border:none;background:transparent;font-family:inherit;font-size:17px;outline:none;resize:none;line-height:1.3;max-height:100px;overflow-y:auto;scrollbar-width:none}
#msg-input::-webkit-scrollbar{display:none}
#msg-input::placeholder{color:#8E8E93}
#send-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#send-btn.active{background:#007AFF}
#send-btn.inactive{background:#AEAEB2;cursor:default}
</style>
</head>
<body>
<div class="phone">
  <div class="status">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#000"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#000"/><rect x="9" y="1" width="3" height="11" rx="1" fill="#000"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.5C10.5 2.5 12.7 3.5 14.3 5.2L15.5 4C13.6 1.9 11 .7 8 .7S2.4 1.9.5 4L1.7 5.2C3.3 3.5 5.5 2.5 8 2.5Z" fill="#000"/><path d="M8 5.5C9.7 5.5 11.2 6.2 12.3 7.3L13.5 6.1C12.1 4.7 10.1 3.8 8 3.8S3.9 4.7 2.5 6.1L3.7 7.3C4.8 6.2 6.3 5.5 8 5.5Z" fill="#000"/><circle cx="8" cy="10.5" r="1.5" fill="#000"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="#000" stroke-width="1" fill="none"/><rect x="22.5" y="3.5" width="2" height="5" rx="1" fill="#000"/><rect x="1.5" y="2.5" width="17" height="7" rx="2" fill="#000"/></svg>
    </div>
  </div>
  <div class="nav">
    <div class="nav-back">
      <svg width="10" height="17" viewBox="0 0 10 17"><path d="M8.5 1L1 8.5L8.5 16" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <span>2</span>
    </div>
    <div class="nav-center">
      <div class="nav-avatar" id="nav-avatar"></div>
      <div class="nav-name" id="nav-name"></div>
    </div>
    <div class="nav-actions">
      <div class="nav-btn">
        <svg width="22" height="22" viewBox="0 0 22 22"><path d="M11 2C6.03 2 2 6.03 2 11s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 2c1.5 0 2.9.44 4.08 1.19L4.19 15.08A6.96 6.96 0 014 11c0-3.86 3.14-7 7-7zm0 14c-1.5 0-2.9-.44-4.08-1.19l10.89-10.89A6.96 6.96 0 0118 11c0 3.86-3.14 7-7 7z" fill="none" stroke="#007AFF" stroke-width="1.5"/><path d="M8 8l6 6M8 14V8h6" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="nav-btn">
        <svg width="22" height="22" viewBox="0 0 22 22"><path d="M15.5 13.5l-2.1 2.1a12.1 12.1 0 01-6.9-6.9l2.1-2.1L6.8 2.5 4 3.5C2.8 8 5.5 14.5 11 18l1-.7 2.5-3.5-1-.3z" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 2v6m3-3h-6" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>
  </div>
  <div class="thread" id="thread"></div>
  <div class="bar">
    <div class="bar-icons">
      <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="13" stroke="#007AFF" stroke-width="1.5" fill="none"/><path d="M9 14h10M14 9v10" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <div class="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="iMessage"></textarea>
    </div>
    <button id="send-btn" class="inactive" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 13V3M3 8l5-5 5 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </button>
  </div>
</div>
<script>
/* === CONFIG — fork here === */
var CFG = {
  CONTACT_NAME: "Jordan",
  CONTACT_INITIAL: "J",
  INITIAL_MESSAGES: [
    {dir:"in",  text:"Hey! Are you still good to meet at 3?", ts:"Today 9:28 AM"},
    {dir:"out", text:"Yes! Just finishing up now. See you soon.", ts:null},
    {dir:"in",  text:"Perfect. I'll grab a table 👍", ts:null},
    {dir:"out", text:"Sounds great, on my way!", ts:null}
  ],
  AUTO_REPLIES: [
    "Sounds good!",
    "Got it, thanks!",
    "On it 👍",
    "Great, see you soon!",
    "Perfect, thanks for letting me know."
  ]
};
/* === END CONFIG === */

var thread = document.getElementById('thread');
var input = document.getElementById('msg-input');
var btn = document.getElementById('send-btn');
var lastOut = null;
var deliveredEl = null;
var sending = false;

document.getElementById('nav-name').textContent = CFG.CONTACT_NAME;
document.getElementById('nav-avatar').textContent = CFG.CONTACT_INITIAL;

function fmtTime(){
  var d=new Date(),h=d.getHours(),m=d.getMinutes(),a=h>=12?'PM':'AM';
  h=h%12||12;
  return 'Today '+h+':'+(m<10?'0'+m:m)+' '+a;
}

function addTs(label){
  var el=document.createElement('div');
  el.className='ts';
  el.textContent=label;
  thread.appendChild(el);
}

function addBubble(dir,text,gap){
  var row=document.createElement('div');
  row.className='msg-row '+dir+(gap?' gap':'');
  var b=document.createElement('div');
  b.className='bubble';
  b.textContent=text;
  row.appendChild(b);
  thread.appendChild(row);
  return row;
}

function addDelivered(){
  if(deliveredEl) deliveredEl.remove();
  deliveredEl=document.createElement('div');
  deliveredEl.className='delivered';
  deliveredEl.textContent='Delivered';
  thread.appendChild(deliveredEl);
}

function scrollBottom(){
  thread.scrollTop=thread.scrollHeight;
}

var prevDir=null;
CFG.INITIAL_MESSAGES.forEach(function(m,i){
  if(m.ts) addTs(m.ts);
  var gap=prevDir&&prevDir===m.dir&&!m.ts;
  addBubble(m.dir,m.text,gap);
  prevDir=m.dir;
});
addDelivered();
scrollBottom();

input.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
  var v=this.value.trim().length>0;
  btn.className=v?'active':'inactive';
  btn.disabled=!v;
});

input.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});

btn.addEventListener('click',send);

function send(){
  var txt=input.value.trim();
  if(!txt||sending) return;
  sending=true;
  input.value='';
  input.style.height='auto';
  btn.className='inactive';
  btn.disabled=true;

  var gap=prevDir==='out';
  addBubble('out',txt,gap);
  prevDir='out';
  addDelivered();
  scrollBottom();

  var delay=1000+Math.random()*1000;
  setTimeout(function(){
    var replies=CFG.AUTO_REPLIES;
    var r=replies[Math.floor(Math.random()*replies.length)];
    addTs(fmtTime());
    addBubble('in',r,false);
    prevDir='in';
    scrollBottom();
    sending=false;
  },delay);
}
</script>
</body>
</html>
