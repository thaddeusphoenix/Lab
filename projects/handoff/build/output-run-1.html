<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Update Flow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;height:100vh;display:flex;flex-direction:column}
#tabs{display:flex;background:#fff;border-bottom:1px solid #ddd}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;color:#8e8e93;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#007aff;border-bottom-color:#007aff}
.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}

/* Foreman View */
#fv{background:#fff}
.chat-header{background:#f7f7f7;border-bottom:1px solid #e0e0e0;padding:10px 16px;display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:#007aff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.chat-title{font-size:16px;font-weight:600}
.chat-sub{font-size:12px;color:#8e8e93}
.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.bubble-row{display:flex;align-items:flex-end;gap:6px}
.bubble-row.out{flex-direction:row-reverse}
.bubble{max-width:72%;padding:8px 12px;border-radius:18px;font-size:15px;line-height:1.4}
.bubble-row.in .bubble{background:#e5e5ea;color:#000;border-bottom-left-radius:4px}
.bubble-row.out .bubble{background:#007aff;color:#fff;border-bottom-right-radius:4px}
.ts{font-size:11px;color:#8e8e93;margin-top:2px}
.bubble-row.out .ts{text-align:right}
.input-bar{display:flex;align-items:center;padding:8px 12px;background:#f7f7f7;border-top:1px solid #e0e0e0;gap:8px}
#msg-input{flex:1;border:1px solid #ddd;border-radius:20px;padding:8px 14px;font-size:15px;outline:none;background:#fff}
#send-btn{background:#007aff;color:#fff;border:none;border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Super View */
#sv{background:#f2f2f7}
.sv-header{background:#fff;padding:14px 16px;border-bottom:1px solid #ddd}
.sv-header h2{font-size:18px;font-weight:700}
.sv-header p{font-size:12px;color:#8e8e93;margin-top:2px}
.sv-toolbar{display:flex;gap:8px;padding:10px 16px;background:#f2f2f7}
.btn-sm{font-size:13px;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-weight:600}
.btn-approve-all{background:#34c759;color:#fff}
.btn-filter{background:#fff;color:#007aff;border:1px solid #007aff}
.btn-filter.active{background:#007aff;color:#fff}
.acts{flex:1;overflow-y:auto;padding:0 16px 16px}
.act-card{background:#fff;border-radius:12px;margin-top:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.act-top{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.act-name{font-size:15px;font-weight:600}
.act-meta{font-size:12px;color:#8e8e93;margin-top:2px}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap}
.badge.pending{background:#fff3cd;color:#856404}
.badge.gap{background:#f8d7da;color:#721c24}
.badge.approved{background:#d4edda;color:#155724}
.act-log{padding:0 14px 10px;font-size:13px;color:#555;border-top:1px solid #f2f2f7;padding-top:8px}
.act-proposal{padding:6px 14px 10px;background:#f0f7ff;font-size:13px;color:#004085}
.act-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #f2f2f7}
.btn-approve{background:#34c759;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer}
.btn-override{background:#fff;color:#ff3b30;border:1px solid #ff3b30;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer}
.override-panel{padding:10px 14px;border-top:1px solid #f2f2f7;display:none}
.override-panel input{width:100%;border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:13px;margin-top:4px}
.btn-confirm-ov{margin-top:6px;background:#ff9500;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer}
.legend{display:flex;gap:12px;padding:8px 16px;font-size:11px;color:#8e8e93;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" onclick="switchTab('fv')">Foreman</div>
  <div class="tab" onclick="switchTab('sv')">Superintendent</div>
</div>

<div id="fv" class="view active">
  <div class="chat-header">
    <div class="avatar">SB</div>
    <div>
      <div class="chat-title">Site Bot</div>
      <div class="chat-sub">Schedule Update Assistant</div>
    </div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="input-bar">
    <input id="msg-input" type="text" placeholder="Message" />
    <button id="send-btn" onclick="sendMsg()">&#8593;</button>
  </div>
</div>

<div id="sv" class="view">
  <div class="sv-header">
    <h2>Daily Schedule Review</h2>
    <p id="sv-date"></p>
  </div>
  <div class="sv-toolbar">
    <button class="btn-sm btn-approve-all" onclick="approveAll()">Approve All Pending</button>
    <button class="btn-sm btn-filter" id="filter-btn" onclick="toggleFilter()">Show Gaps Only</button>
  </div>
  <div class="legend">
    <span><div class="dot" style="background:#856404"></div>Pending</span>
    <span><div class="dot" style="background:#721c24"></div>No Report</span>
    <span><div class="dot" style="background:#155724"></div>Approved</span>
  </div>
  <div class="acts" id="acts"></div>
</div>

<script>
var now = new Date();
var dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
document.getElementById('sv-date').textContent = dateStr;

var schedule = [
  {id:'A1',name:'Electrical Rough-In — North Wing',trade:'Electrical',foreman:'J. Reyes',planned:65,unit:'%',keywords:['electrical','north','conduit','rough','rough-in','zone 4','zone4']},
  {id:'A2',name:'Concrete Pour — Level 3 Deck',trade:'Concrete',foreman:'M. Torres',planned:100,unit:'%',keywords:['concrete','pour','level 3','deck','slab','l3']},
  {id:'A3',name:'Mechanical Duct Install — East Corridor',trade:'Mechanical',foreman:'D. Kim',planned:40,unit:'%',keywords:['mechanical','duct','hvac','east','corridor','mech']},
  {id:'A4',name:'Framing — South Tower Floors 4-6',trade:'Framing',foreman:'R. Patel',planned:80,unit:'%',keywords:['framing','frame','south tower','floor 4','floor 5','floor 6','sf']},
  {id:'A5',name:'Fire Sprinkler Rough-In — Level 2',trade:'Fire Protection',foreman:'L. Gomez',planned:50,unit:'%',keywords:['sprinkler','fire','level 2','l2','fp']}
];

var logs = {};
var statuses = {};
var filter = false;

function ts(){
  return now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

var initMsgs = [
  {dir:'in',text:"Good morning! Send me your progress update for today and I'll log it to the schedule."}
];
var chatMsgs = [...initMsgs];

function renderChat(){
  var el = document.getElementById('msgs');
  el.innerHTML = chatMsgs.map(function(m){
    return '<div class="bubble-row '+m.dir+'"><div class="bubble">'+m.text+'</div></div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}
renderChat();

document.getElementById('msg-input').addEventListener('keydown',function(e){
  if(e.key==='Enter') sendMsg();
});

function sendMsg(){
  var inp = document.getElementById('msg-input');
  var txt = inp.value.trim();
  if(!txt) return;
  inp.value='';
  chatMsgs.push({dir:'out',text:txt});
  renderChat();
  setTimeout(function(){processMsg(txt);},600);
}

function processMsg(txt){
  var low = txt.toLowerCase();
  var matched = null;
  var bestScore = 0;
  schedule.forEach(function(act){
    var score = 0;
    act.keywords.forEach(function(k){if(low.includes(k)) score++;});
    if(score>bestScore){bestScore=score;matched=act;}
  });

  var pct = extractPct(low);
  var reply;

  if(matched && bestScore>0){
    logs[matched.id] = txt;
    statuses[matched.id] = {status:'pending',actual:pct!==null?pct:matched.planned,note:txt};
    reply = 'Got it — logged against "'+matched.name+'".'+(pct!==null?' Reported at '+pct+'% complete.':' I\'ll propose matching planned progress. The super will review.');
  } else {
    reply = "I couldn't match that to a scheduled activity. Try mentioning the trade or location (e.g. 'electrical north wing' or 'level 3 concrete').";
  }
  chatMsgs.push({dir:'in',text:reply});
  renderChat();
  renderActs();
}

function extractPct(txt){
  var m = txt.match(/(\d{1,3})\s*(%|percent)/);
  if(m) return parseInt(m[1]);
  var words = {'hundred':100,'fifty':50,'seventy':70,'eighty':80,'sixty':60,'forty':40,'thirty':30,'twenty':20,'ninety':90};
  for(var w in words){if(txt.includes(w)) return words[w];}
  return null;
}

function renderActs(){
  var el = document.getElementById('acts');
  el.innerHTML = schedule.map(function(act){
    var s = statuses[act.id];
    var log = logs[act.id];
    var st = s?s.status:'gap';
    if(filter && st!=='gap') return '';
    var badge = st==='approved'?'approved':st==='pending'?'pending':'gap';
    var badgeText = st==='approved'?'Approved':st==='pending'?'Pending Review':'No Report';
    var proposal = s?'Proposed: Set actual to '+s.actual+'% (planned '+act.planned+'%)':'—';
    var logTxt = log?'&ldquo;'+log+'&rdquo;':'No update received from '+act.foreman+'.';
    var actions = '';
    if(st==='pending'){
      actions='<div class="act-actions"><button class="btn-approve" onclick="approve(\''+act.id+'\')">Approve</button><button class="btn-override" onclick="showOv(\''+act.id+'\')">Override</button></div><div class="override-panel" id="ov-'+act.id+'"><label style="font-size:12px;color:#555">Set actual %:</label><input type="number" id="ovi-'+act.id+'" min="0" max="100" placeholder="e.g. 55"/><button class="btn-confirm-ov" onclick="confirmOv(\''+act.id+'\')">Confirm Override</button></div>';
    }
    return '<div class="act-card" id="card-'+act.id+'"><div class="act-top"><div><div class="act-name">'+act.name+'</div><div class="act-meta">'+act.trade+' · Foreman: '+act.foreman+' · Planned: '+act.planned+'%</div></div><div><span class="badge '+badge+'">'+badgeText+'</span></div></div><div class="act-log">'+logTxt+'</div>'+(s?'<div class="act-proposal">'+proposal+'</div>':'')+actions+'</div>';
  }).join('');
}
renderActs();

function approve(id){
  if(statuses[id]) statuses[id].status='approved';
  renderActs();
}

function approveAll(){
  schedule.forEach(function(act){
    if(statuses[act.id]&&statuses[act.id].status==='pending') statuses[act.id].status='approved';
  });
  renderActs();
}

function showOv(id){
  var p = document.getElementById('ov-'+id);
  p.style.display = p.style.display==='block'?'none':'block';
}

function confirmOv(id){
  var v = parseInt(document.getElementById('ovi-'+id).value);
  if(isNaN(v)||v<0||v>100) return;
  statuses[id].actual=v;
  statuses[id].status='approved';
  renderActs();
}

function toggleFilter(){
  filter=!filter;
  var b=document.getElementById('filter-btn');
  b.classList.toggle('active',filter);
  b.textContent=filter?'Show All':'Show Gaps Only';
  renderActs();
}

function switchTab(id){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById(id).classList.add('active');
  var idx=id==='fv'?0:1;
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if(id==='sv') renderActs();
}
</script>
</body>
</html>
